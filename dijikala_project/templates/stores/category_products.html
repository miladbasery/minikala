{% extends 'base.html' %}

{% block content %}
<h2 style="margin-bottom: 20px;">محصولات دسته: <span style="color: var(--primary);">{{ category.name }}</span></h2>

<div class="grid-cards">
    {% for product in products %}
        <div class="card glass-panel">
            <a href="{% url 'stores:product_detail' product.id %}" class="card-image-wrapper">
                <img src="{{ product.get_image_url }}" alt="{{ product.name }}" style="width: 100%; height: 100%; object-fit: cover;">
            </a>
            
            <h3 class="card-title"><a href="{% url 'stores:product_detail' product.id %}" style="color: inherit; text-decoration: none;">{{ product.name }}</a></h3>
            
            <div class="price-section" style="margin-top: 10px; margin-bottom: 15px;">
                <span class="price-final persian-num">{{ product.price }} تومان</span>
            </div>
            
            <a href="{% url 'stores:product_detail' product.id %}" class="btn-glass btn-primary" style="width:100%; margin-top: auto;">مشاهده محصول</a>
        </div>
    {% empty %}
        <div class="glass-panel" style="grid-column: 1 / -1; padding: 40px; text-align: center;">
            <svg class="icon" style="width: 60px; height: 60px; fill: #888; margin-bottom: 15px;" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <p style="color: #888; font-size: 1.1rem;">محصولی در این دسته‌بندی یافت نشد.</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
