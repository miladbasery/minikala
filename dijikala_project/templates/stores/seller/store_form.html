{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="padding: 30px; max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px; color: var(--primary);">ایجاد / ویرایش فروشگاه</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin-bottom: 20px; line-height: 2;">
            {{ form.as_p }}
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn-glass btn-primary" style="flex: 1;">ذخیره فروشگاه</button>
            <a href="{% url 'stores:manage_stores' %}" class="btn-glass" style="flex: 1; text-align: center;">بازگشت به لیست</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const formInputs = document.querySelectorAll('form input[type="text"], form input[type="number"], form textarea, form select');
        formInputs.forEach(input => {
            input.classList.add('custom-input');
        });
    });
</script>
{% endblock %}
